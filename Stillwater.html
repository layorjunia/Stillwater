/* =========================================================
   SHRED — top-bar handler
   ========================================================= */
function triggerShred() {
  const sel = state.selected;
  if (sel && sel.source === 'library') {
    if (sel.type === 'thought') return shredLibraryThought(sel.id);
    if (sel.type === 'grievance') return shredLibraryGrievance(sel.id);
    if (sel.type === 'journal') return shredLibraryJournal(sel.id);
  }
  if (state.mode === 'thought') return shredNegatives();
  if (state.mode === 'grievance') return shredCurrentGrievance();
  if (state.mode === 'journal') return $('#journal-shred').click();
}

function spawnSlash(overlay, rect, i, slashDelay, slashDuration) {
  const slash = document.createElement('div');
  slash.className = 'shred-slash';
  const angle = Math.random() * Math.PI;
  const len = Math.hypot(rect.width, rect.height) * 1.5 + 200;
  const cx = rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width;
  const cy = rect.top + rect.height / 2 + (Math.random() - 0.5) * rect.height;
  const ox = cx - Math.cos(angle) * (len / 2);
  const oy = cy - Math.sin(angle) * (len / 2);
  slash.style.left = ox + 'px';
  slash.style.top = oy + 'px';
  slash.style.setProperty('--slash-len', len + 'px');
  slash.style.transform = `rotate(${angle}rad)`;
  slash.style.animation = `slashIn ${slashDuration}ms ease-out ${i * slashDelay}ms forwards`;
  overlay.appendChild(slash);
}
function shakeBubble(targetEl, delay) {
  setTimeout(() => {
    const dx = (Math.random() - 0.5) * 9;
    const dy = (Math.random() - 0.5) * 9;
    targetEl.style.transition = 'transform 0.08s';
    targetEl.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px)`;
    setTimeout(() => { targetEl.style.transform = ''; targetEl.style.transition = ''; }, 80);
  }, delay);
}
/* Spawns BOTH vertical and horizontal strips so the bubble looks shredded
   in a grid rather than only sliced one direction. */
function spawnPiecesFor(el, overlay, paper) {
  const rect = el.getBoundingClientRect();
  const numV = 12, numH = 10;
  // vertical strips
  for (let i = 0; i < numV; i++) addStrip(el, rect, overlay, i, numV, 'v', paper);
  // horizontal strips
  for (let i = 0; i < numH; i++) addStrip(el, rect, overlay, i, numH, 'h', paper);
  el.style.transition = 'opacity 0.25s';
  el.style.opacity = '0';
}
function addStrip(el, rect, overlay, i, total, dir, paper) {
  const piece = document.createElement('div');
  piece.className = 'shred-piece';
  piece.style.left = rect.left + 'px';
  piece.style.top = rect.top + 'px';
  piece.style.width = rect.width + 'px';
  piece.style.height = rect.height + 'px';

  const clone = el.cloneNode(true);
  clone.style.cssText = 'opacity:1;transition:none;animation:none;position:absolute;left:0;top:0;transform:none;filter:none;margin:0;pointer-events:none;width:100%;height:100%;';
  freezeAnimations(clone);

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;inset:0;overflow:hidden;';
  const skew = paper ? 1.5 : 4;
  const slice = 100 / total;
  const a = i * slice, b = (i + 1) * slice;
  if (dir === 'v') {
    wrap.style.clipPath = `polygon(${a - skew}% 0, ${b - skew}% 0, ${b + skew}% 100%, ${a + skew}% 100%)`;
  } else {
    wrap.style.clipPath = `polygon(0 ${a - skew}%, 100% ${a + skew}%, 100% ${b + skew}%, 0 ${b - skew}%)`;
  }
  wrap.style.webkitClipPath = wrap.style.clipPath;
  wrap.appendChild(clone);
  piece.appendChild(wrap);

  const dx = (i - total / 2 + 0.5) * (paper ? 5 : 8) + (Math.random() - 0.5) * 100;
  const dy = 320 + Math.random() * 240;
  const dr = (Math.random() - 0.5) * (paper ? 60 : 100);
  piece.style.setProperty('--dx', dx + 'px');
  piece.style.setProperty('--dy', dy + 'px');
  piece.style.setProperty('--dr', dr + 'deg');
  const fallDur = 1200 + Math.random() * 500;
  piece.style.animation = `pieceFall ${fallDur}ms cubic-bezier(0.45, 0.05, 0.85, 0.5) ${i * 16}ms forwards`;
  overlay.appendChild(piece);
}

/* Pop one bubble (and its descendants), each with their own pop animation.
   Called from the per-bubble pop button. */
function popBubble(bubbleId) {
  if (state.shredding) return;
  const w = state.current.thought;
  if (!w) return;
  const target = w.bubbles.find(b => b.id === bubbleId);
  if (!target || target.parentId === null) return; // trigger isn't poppable

  const ids = new Set([bubbleId]);
  let added = true;
  while (added) {
    added = false;
    for (const b of w.bubbles) {
      if (b.parentId && ids.has(b.parentId) && !ids.has(b.id)) {
        ids.add(b.id); added = true;
      }
    }
  }
  state.shredding = true;
  updateShredButton();

  $$('#thought-svg line').forEach(ln => {
    if (ids.has(ln.dataset.from) || ids.has(ln.dataset.to)) {
      ln.style.transition = 'opacity 0.3s';
      ln.style.opacity = '0';
    }
  });

  let i = 0;
  for (const id of ids) {
    const b = w.bubbles.find(x => x.id === id);
    setTimeout(() => {
      const el = $(`.bubble[data-id="${id}"]`);
      if (el) popBubbleVisual(el, b && b.type === 'negative');
    }, i * 90);
    i++;
  }
  setTimeout(() => {
    w.bubbles = w.bubbles.filter(b => !ids.has(b.id));
    renderThoughtWeb(true);
    state.shredding = false;
    updateShredButton();
  }, i * 90 + 700);
}

function popBubbleVisual(el, isNegative) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const overlay = document.createElement('div');
  overlay.className = 'pop-overlay';
  document.body.appendChild(overlay);

  const colorMain = isNegative ? '#B8413E' : '#1E5A8E';
  const colorHi = isNegative ? '#FFB8B5' : '#88BFE5';

  // ring
  const ringSize = Math.max(rect.width, rect.height) * 0.9;
  const ring = document.createElement('div');
  ring.className = 'pop-ring';
  ring.style.left = (cx - ringSize/2) + 'px';
  ring.style.top = (cy - ringSize/2) + 'px';
  ring.style.width = ringSize + 'px';
  ring.style.height = ringSize + 'px';
  ring.style.borderColor = colorMain;
  ring.style.boxShadow = `0 0 18px ${colorMain}`;
  overlay.appendChild(ring);

  // droplets
  const droplets = 16;
  for (let i = 0; i < droplets; i++) {
    const d = document.createElement('div');
    d.className = 'pop-droplet';
    const angle = (i / droplets) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist = 60 + Math.random() * 90;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 16;
    const size = 5 + Math.random() * 9;
    d.style.left = (cx - size/2) + 'px';
    d.style.top = (cy - size/2) + 'px';
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.background = `radial-gradient(circle, ${colorHi}, ${colorMain})`;
    d.style.setProperty('--dx', dx + 'px');
    d.style.setProperty('--dy', dy + 'px');
    d.style.animation = `popDroplet ${0.55 + Math.random() * 0.3}s cubic-bezier(0.3, 0.05, 0.4, 1) forwards`;
    overlay.appendChild(d);
  }

  el.classList.add('popping');
  setTimeout(() => overlay.remove(), 900);
}

function shredCurrentGrievance() {
  const g = state.current.grievance;
  if (!g || !(g.text || '').trim()) return;
  state.shredding = true;
  shredElement($('#grievance-card'), () => {
    state.grievances = state.grievances.filter(x => x.id !== g.id);
    persist();
    renderLibrary();
    newGrievance();
    state.shredding = false;
    clearSelection();
    toast('Shredded');
  }, { strips: 22, slashes: 24, paper: true });
}

function shredLibraryThought(id) {
  const t = state.thoughts.find(x => x.id === id);
  if (!t) return;
  state.shredding = true;
  setMode('thought');
  state.current.thought = JSON.parse(JSON.stringify(t));
  state.current.thought.bubbles.forEach(b => { if (!b.type) b.type = 'negative'; });
  renderThoughtWeb(true);
  setTimeout(() => {
    shredElement($('#thought-canvas'), () => {
      state.thoughts = state.thoughts.filter(x => x.id !== id);
      state.current.thought = null;
      renderThoughtWeb(true);
      persist();
      renderLibrary();
      state.shredding = false;
      clearSelection();
      toast('Shredded');
    }, { strips: 22, slashes: 26, paper: false });
  }, 380);
}

function shredLibraryGrievance(id) {
  const g = state.grievances.find(x => x.id === id);
  if (!g) return;
  state.shredding = true;
  setMode('grievance');
  // load library content into the active card so the user sees the actual paper
  state.current.grievance = { id: g.id, text: g.text, forgiven: true };
  renderGrievance();
  setTimeout(() => {
    shredElement($('#grievance-card'), () => {
      state.grievances = state.grievances.filter(x => x.id !== id);
      persist();
      renderLibrary();
      newGrievance();
      state.shredding = false;
      clearSelection();
      toast('Shredded');
    }, { strips: 22, slashes: 24, paper: true });
  }, 380);
}

function shredLibraryJournal(id) {
  const j = state.journals.find(x => x.id === id);
  if (!j) return;
  state.shredding = true;
  setMode('journal');
  state.current.journal = {
    id: j.id, title: j.title || '', text: j.text || '',
    type: j.type || 'negative', linkedId: j.linkedId,
  };
  renderJournal();
  setTimeout(() => {
    shredElement($('#journal-card'), () => {
      state.journals = state.journals.filter(x => x.id !== id);
      unlinkJournalCompanion(id);
      persist();
      renderLibrary();
      newJournal();
      state.shredding = false;
      clearSelection();
      toast('Shredded');
    }, { strips: 22, slashes: 26, paper: true });
  }, 380);
}

/* =========================================================
   SHRED — animations
   ========================================================= */
// Freeze all animations on a cloned subtree so pieces don't keep morphing.
function freezeAnimations(node) {
  if (!node || node.nodeType !== 1) return;
  node.style.animation = 'none';
  node.style.transition = 'none';
  for (const child of node.children) freezeAnimations(child);
}

function shredElement(el, done, opts = {}) {
  const numSlashes = opts.slashes || 26;
  const paper = !!opts.paper;

  const rect = el.getBoundingClientRect();
  const overlay = document.createElement('div');
  overlay.className = 'shred-overlay';
  document.body.appendChild(overlay);

  el.style.transition = 'opacity 0.3s, filter 0.3s, transform 0.15s';

  const slashDelay = 26;
  const slashDuration = 240;
  for (let i = 0; i < numSlashes; i++) {
    spawnSlash(overlay, rect, i, slashDelay, slashDuration);
    setTimeout(() => {
      const dx = (Math.random() - 0.5) * 9;
      const dy = (Math.random() - 0.5) * 9;
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      setTimeout(() => { el.style.transform = ''; }, 70);
    }, i * slashDelay + 30);
  }

  const totalSlashTime = numSlashes * slashDelay + slashDuration;
  setTimeout(() => {
    el.style.filter = 'blur(2px)';
    spawnPiecesFor(el, overlay, paper);
    setTimeout(() => {
      overlay.remove();
      el.style.transition = '';
      el.style.opacity = '';
      el.style.filter = '';
      el.style.transform = '';
      done && done();
    }, 1900);
  }, totalSlashTime);
}

/* Shred all negative bubbles in current web. Positives stay put. */
function shredNegatives() {
  const w = state.current.thought;
  if (!w) return;
  const negatives = w.bubbles.filter(b => b.type === 'negative');
  if (negatives.length === 0) return;

  state.shredding = true;
  updateShredButton();

  const negEls = negatives.map(b => $(`.bubble[data-id="${b.id}"]`)).filter(Boolean);
  const negIds = new Set(negatives.map(b => b.id));

  $$('#thought-svg line').forEach(ln => {
    if (negIds.has(ln.dataset.from) || negIds.has(ln.dataset.to)) {
      ln.style.transition = 'opacity 0.4s';
      ln.style.opacity = '0';
    }
  });

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const el of negEls) {
    const r = el.getBoundingClientRect();
    minX = Math.min(minX, r.left);
    minY = Math.min(minY, r.top);
    maxX = Math.max(maxX, r.right);
    maxY = Math.max(maxY, r.bottom);
  }
  const union = { left: minX, top: minY, width: Math.max(80, maxX - minX), height: Math.max(80, maxY - minY) };

  const overlay = document.createElement('div');
  overlay.className = 'shred-overlay';
  document.body.appendChild(overlay);

  const numSlashes = Math.min(48, 18 + negEls.length * 4);
  const slashDelay = 24;
  const slashDuration = 240;
  for (let i = 0; i < numSlashes; i++) {
    spawnSlash(overlay, union, i, slashDelay, slashDuration);
    const targetEl = negEls[Math.floor(Math.random() * negEls.length)];
    if (targetEl) shakeBubble(targetEl, i * slashDelay + 30);
  }

  const totalSlashTime = numSlashes * slashDelay + slashDuration;
  setTimeout(() => {
    for (const el of negEls) {
      spawnPiecesFor(el, overlay, false);
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
    }

    setTimeout(() => {
      overlay.remove();
      // Reparent any positives whose parent was negative back to the trigger,
      // so the trigger keeps its single-anchor structure.
      const trigger = w.bubbles.find(b => b.parentId === null);
      const triggerId = trigger ? trigger.id : null;
      w.bubbles.forEach(b => {
        if (b.parentId && negIds.has(b.parentId)) b.parentId = triggerId;
      });
      w.bubbles = w.bubbles.filter(b => !negIds.has(b.id));
      renderThoughtWeb(true);
      state.shredding = false;
      updateShredButton();
      toast('Negativity released');
    }, 1900);
  }, totalSlashTime);
}

/* =========================================================
   BURN
   ========================================================= */
function burnElement(el, done) {
  const rect = el.getBoundingClientRect();
  const overlay = document.createElement('div');
  overlay.className = 'burn-overlay';
  document.body.appendChild(overlay);

  // Char zone — the dark scorched layer rising from the bottom of the page
  const burnLine = document.createElement('div');
  burnLine.className = 'burn-line';
  burnLine.style.left = rect.left + 'px';
  burnLine.style.top = rect.top + 'px';
  burnLine.style.width = rect.width + 'px';
  burnLine.style.height = rect.height + 'px';
  burnLine.style.borderRadius = getComputedStyle(el).borderRadius;
  overlay.appendChild(burnLine);

  el.classList.add('burning');

  const startTime = Date.now();
  const burnDuration = 2400;
  const tickInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    if (elapsed > burnDuration) { clearInterval(tickInterval); return; }
    const progress = elapsed / burnDuration;
    const burnY = rect.bottom - rect.height * progress;

    // Spawn flame tongues at random spots along the burn line
    const flameCount = 3 + Math.floor(Math.random() * 3);
    for (let k = 0; k < flameCount; k++) {
      const flame = document.createElement('div');
      flame.className = 'flame-tongue';
      const x = rect.left + Math.random() * rect.width;
      const y = burnY + (Math.random() - 0.5) * 28;
      const w = 28 + Math.random() * 38;
      const h = 60 + Math.random() * 90;
      flame.style.left = (x - w / 2) + 'px';
      flame.style.top = (y - h * 0.7) + 'px';
      flame.style.width = w + 'px';
      flame.style.height = h + 'px';
      const dur = 0.55 + Math.random() * 0.4;
      flame.style.animationDuration = dur + 's';
      overlay.appendChild(flame);
      setTimeout(() => flame.remove(), dur * 1000 + 100);
    }

    // Smaller fast-flickering inner sparks
    const sparkCount = 2 + Math.floor(Math.random() * 2);
    for (let k = 0; k < sparkCount; k++) {
      const sp = document.createElement('div');
      sp.className = 'flame-spark';
      const x = rect.left + Math.random() * rect.width;
      const y = burnY + (Math.random() - 0.5) * 20;
      const w = 14 + Math.random() * 22;
      const h = 30 + Math.random() * 50;
      sp.style.left = (x - w / 2) + 'px';
      sp.style.top = (y - h * 0.7) + 'px';
      sp.style.width = w + 'px';
      sp.style.height = h + 'px';
      const dur = 0.3 + Math.random() * 0.25;
      sp.style.animationDuration = dur + 's';
      overlay.appendChild(sp);
      setTimeout(() => sp.remove(), dur * 1000 + 100);
    }

    // Embers floating up
    const emberCount = 2 + Math.floor(Math.random() * 2);
    for (let k = 0; k < emberCount; k++) {
      const ember = document.createElement('div');
      ember.className = 'ember';
      const x = rect.left + Math.random() * rect.width;
      const y = burnY + (Math.random() - 0.5) * 22;
      ember.style.left = x + 'px';
      ember.style.top = y + 'px';
      const size = 3 + Math.random() * 5;
      ember.style.width = size + 'px';
      ember.style.height = size + 'px';
      const dx = (Math.random() - 0.5) * 100;
      const dy = -130 - Math.random() * 220;
      ember.style.setProperty('--dx', dx + 'px');
      ember.style.setProperty('--dy', dy + 'px');
      overlay.appendChild(ember);
      setTimeout(() => ember.remove(), 1700);
    }
  }, 38);

  setTimeout(() => {
    clearInterval(tickInterval);
    overlay.remove();
    el.classList.remove('burning');
    el.style.opacity = '';
    el.style.filter = '';
    done && done();
  }, 2700);
}

/* =========================================================
   Mobile menu + init
   ========================================================= */
function openSidebar() {
  $('#sidebar').classList.add('open');
  $('#sidebar-scrim').classList.add('visible');
}
function closeSidebar() {
  $('#sidebar').classList.remove('open');
  $('#sidebar-scrim').classList.remove('visible');
}
$('#menu-toggle')?.addEventListener('click', (e) => {
  e.stopPropagation();
  if ($('#sidebar').classList.contains('open')) closeSidebar();
  else openSidebar();
});
$('#sidebar-close')?.addEventListener('click', (e) => {
  e.stopPropagation();
  closeSidebar();
});
$('#sidebar-scrim')?.addEventListener('click', closeSidebar);
// Tap outside the sidebar (on the workspace) on small screens also closes it
document.addEventListener('click', (e) => {
  if (window.innerWidth > 540) return;
  if (!$('#sidebar').classList.contains('open')) return;
  if (e.target.closest('#sidebar') || e.target.closest('#menu-toggle')) return;
  closeSidebar();
});

loadState();
renderLibrary();
syncTypeToggle();
setupCanvasPanZoom();

state.current.thought = makeFreshWeb();

// Defer initial render until the layout has actually computed canvas dimensions.
// On mobile this prevents the trigger landing at (0,0) when the canvas is still
// reporting clientWidth=0 during script execution.
function bootInitialRender() {
  renderThoughtWeb(true);
  updateShredButton();
  applyTransform();
  setTimeout(() => {
    const t = $('.bubble.trigger .bubble-text');
    if (t) t.focus();
  }, 300);
}
requestAnimationFrame(() => requestAnimationFrame(bootInitialRender));
</script>
